services:
  api:
    build:
      context: .           # build context is aidflow/ so both backend/ and frontend/ are accessible
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongo:27017
      DB_NAME: aidflow
      COMPLAINTS_JSON: /data/complaints.json
    volumes:
      # Mount complaints.json from the parent swachhata/ directory (produced by extract_complaints.py)
      - ../complaints.json:/data/complaints.json:ro
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo_data:
